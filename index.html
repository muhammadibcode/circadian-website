<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circadian — Science-Backed Alarm</title>
  <meta name="description" content="Sleep Cycle Tracker & Sounds. Wake up feeling good with science-backed alarm sounds and accountability missions.">
  <link rel="icon" type="image/png" href="/assets/bed.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #2E2D2D;
      color: #F3F3F3;
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; padding: 40px 20px 0;
    }
    .bed-icon {
      width: 220px; height: auto; margin-bottom: 48px;
      animation: floatIn 1s ease-out both;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .app-store-badge {
      display: inline-block;
      transition: opacity 0.2s ease, transform 0.2s ease;
      animation: floatIn 1s ease-out 0.15s both;
    }
    .app-store-badge:hover { opacity: 0.85; transform: scale(1.03); }
    .app-store-badge img { height: 52px; width: auto; }
    footer {
      position: relative; z-index: 1;
      padding: 28px 20px 32px;
      display: flex; gap: 28px; align-items: center; justify-content: center;
      animation: floatIn 1s ease-out 0.3s both;
    }
    footer a {
      color: #F3F3F3; opacity: 0.45; text-decoration: none;
      font-size: 13px; letter-spacing: 0.02em; transition: opacity 0.2s ease;
    }
    footer a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="container">
    <img src="/assets/bed.png" alt="Circadian" class="bed-icon">
    <a href="https://apps.apple.com/app/circadian" class="app-store-badge" aria-label="Download on the App Store">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
  </div>
  <footer>
    <a href="/terms">Terms</a>
    <a href="/privacy">Privacy</a>
    <a href="mailto:contact@momentapps.co.uk">Support</a>
  </footer>
  <script src="/assets/background.js"></script>
</body>
</html>
